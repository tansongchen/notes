usaurus_skipToContent_fallback" class="main-wrapper mainWrapper_z2l0 docsWrapper_BCFX"><button aria-label="回到顶部" class="clean-btn theme-back-to-top-button backToTopButton_sjWU" type="button"></button><div class="docPage__5DB"><main class="docMainContainer_gTbr docMainContainerEnhanced_Uz_u"><div class="container padding-top--md padding-bottom--lg"><div class="row"><div class="col docItemCol_VOVn"><div class="docItemContainer_Djhp"><article><div class="theme-doc-markdown markdown"><header><h1>睫毛膏的使用</h1></header><p>推荐新手使用刷头较干净（不带有太多纤维）的睫毛膏，如 innisfree</p><p>手法：从根部开始，Z 字形方式向上向外拖</p><p>刷下睫毛的时候可以用纸巾垫着刷</p><p><img loading="lazy" src="https://raw.githubusercontent.com/tansongchen/images/master/2022/06/26/zhcw9D.png" alt="zhcw9D" class="img_ev3q"></p><ol><li>用刷子水平地在中间的睫毛上刷上睫毛膏</li><li>再将刷子竖直地给眼尾和眼头部分的睫毛刷上睫毛膏</li></ol></div></article><nav class="pagination-nav docusaurus-mt-lg" aria-label="文档分页导航"></nav></div></div></div></div></main></div></div><footer class="footer footer--dark"><div class="container container-fluid"><div class="footer__bottom text--center"><div class="footer__copyright">CC-BY-SA 4.0 © 2022 - 2022 谭淞宸</div></div></div></footer></div>
